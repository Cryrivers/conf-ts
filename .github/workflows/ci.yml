  publish:
    name: Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    # needs: [native-lint, test-macOS-windows-binding, test-linux-binding]
    needs: [build, native-lint, native-build]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          cache: true

      - name: Install dependencies
        run: pnpm install

      - name: Create compiler npm dirs
        run: pnpm --filter @conf-ts/compiler-native exec napi create-npm-dirs

      - name: Create macro transformer npm dirs
        run: pnpm --filter @conf-ts/macro-transformer-native exec napi create-npm-dirs

      - name: Download compiler native artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: bindings-*
          path: packages/@conf-ts/compiler-native/artifacts
          merge-multiple: true

      - name: Download compiler WASI artifacts
        uses: actions/download-artifact@v8
        with:
          name: compiler-wasi
          path: packages/@conf-ts/compiler-native/artifacts

      - name: Download macro transformer native artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: macro-bindings-*
          path: packages/@conf-ts/macro-transformer-native/artifacts
          merge-multiple: true

      - name: Download macro transformer WASI artifacts
        uses: actions/download-artifact@v8
        with:
          name: macro-wasi
          path: packages/@conf-ts/macro-transformer-native/artifacts

      - name: Download SWC plugin artifact
        uses: actions/download-artifact@v8
        with:
          name: swc-plugin-wasm
          path: packages/@conf-ts/swc-plugin

      - name: Assemble compiler native packages
        run: pnpm --filter @conf-ts/compiler-native exec napi artifacts --build-output-dir artifacts

      - name: Restore generated compiler entrypoints
        run: cp artifacts/* .
        working-directory: packages/@conf-ts/compiler-native

      - name: Assemble macro transformer native packages
        run: pnpm --filter @conf-ts/macro-transformer-native exec napi artifacts --build-output-dir artifacts

      - name: Restore generated macro transformer outputs
        run: cp artifacts/* .
        working-directory: packages/@conf-ts/macro-transformer-native

      - name: List compiler native packages
        run: ls -R ./npm
        shell: bash
        working-directory: packages/@conf-ts/compiler-native

      - name: List macro transformer native packages
        run: ls -R ./npm
        shell: bash
        working-directory: packages/@conf-ts/macro-transformer-native

      - name: Build packages
        run: |
          pnpm --filter @conf-ts/expr-core build
          pnpm --filter @conf-ts/expression build
          pnpm --filter @conf-ts/macro build
          pnpm --filter @conf-ts/compiler build
          pnpm --filter @conf-ts/macro-transformer build
          pnpm --filter @conf-ts/cli build
          pnpm --filter @conf-ts/webpack-plugin build

      - name: Configure npm registry
        run: |
          echo "//registry.npmjs.org/:_authToken=$NPM_TOKEN" >> ~/.npmrc
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Determine publish tag
        id: tag
        run: |
          if git log -1 --pretty=%B | grep -qE "^[0-9]+\.[0-9]+\.[0-9]+$"; then
            echo "tag=" >> $GITHUB_OUTPUT
            echo "reason=stable release"
          elif git log -1 --pretty=%B | grep -qE "^[0-9]+\.[0-9]+\.[0-9]+"; then
            echo "tag=--tag next" >> $GITHUB_OUTPUT
            echo "reason=pre-release"
          else
            echo "tag=skip" >> $GITHUB_OUTPUT
            echo "reason=not a release commit"
          fi
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish packages
        if: steps.tag.outputs.tag != 'skip'
        run: |
          pnpm config set provenance true
          pnpm config set git-checks false
          git status
          git diff
          pnpm publish -r --filter "@conf-ts/compiler-native*" --access public ${{ steps.tag.outputs.tag }}
          pnpm publish -r --filter "@conf-ts/macro-transformer-native*" --access public ${{ steps.tag.outputs.tag }}
          git status
          git diff
          pnpm publish -r --filter "@conf-ts/expr-core" --access public ${{ steps.tag.outputs.tag }}
          pnpm publish -r --filter "@conf-ts/expression" --access public ${{ steps.tag.outputs.tag }}
          pnpm publish -r --filter "@conf-ts/compiler" --access public ${{ steps.tag.outputs.tag }}
          pnpm publish -r --filter "@conf-ts/macro" --access public ${{ steps.tag.outputs.tag }}
          pnpm publish -r --filter "@conf-ts/macro-transformer" --access public ${{ steps.tag.outputs.tag }}
          pnpm publish -r --filter "@conf-ts/cli" --access public ${{ steps.tag.outputs.tag }}
          pnpm publish -r --filter "@conf-ts/webpack-plugin" --access public ${{ steps.tag.outputs.tag }}
          pnpm publish -r --filter "@conf-ts/swc-plugin" --access public ${{ steps.tag.outputs.tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Skip publish
        if: steps.tag.outputs.tag == 'skip'
        run: echo "Not a release, skipping publish"
