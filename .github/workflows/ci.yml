name: CI

env:
  DEBUG: napi:*
  MACOSX_DEPLOYMENT_TARGET: "10.13"
  CARGO_INCREMENTAL: "1"

on:
  push:
    branches: [main]
    tags-ignore: ["**"]
    paths-ignore:
      - "**/*.md"
      - LICENSE
      - "**/*.gitignore"
      - .editorconfig
      - docs/**
  pull_request:
    types: [opened, synchronize]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

jobs:
  build:
    name: Build and Test
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.0
          components: rustfmt, clippy

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          cache: true

      - name: Install dependencies
        run: pnpm install

      - name: Build and test
        run: pnpm build && pnpm test

  native-lint:
    name: Lint (native)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          cache: true

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.0
          components: clippy, rustfmt

      - name: Install dependencies
        run: pnpm install

      # - name: Oxlint
      #   run: pnpm --filter @conf-ts/compiler-native lint

      - name: Cargo fmt
        run: cargo fmt --all -- --check
        working-directory: packages/@conf-ts

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
        working-directory: packages/@conf-ts

  native-build:
    name: Native - ${{ matrix.settings.target }} - node@24
    runs-on: ${{ matrix.settings.host }}
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: macos-latest
            target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin
          - host: windows-latest
            target: x86_64-pc-windows-msvc
            args: --target x86_64-pc-windows-msvc
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            args: --target x86_64-unknown-linux-gnu --use-napi-cross
          - host: ubuntu-latest
            target: x86_64-unknown-linux-musl
            args: --target x86_64-unknown-linux-musl --cross-compile
          - host: macos-latest
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          cache: true

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.0
          components: rustfmt, clippy
          targets: ${{ matrix.settings.target }}

      - uses: mlugg/setup-zig@v2
        if: ${{ contains(matrix.settings.target, 'musl') }}
        with:
          version: 0.14.1

      - name: Install cargo-zigbuild
        uses: taiki-e/install-action@v2
        if: ${{ contains(matrix.settings.target, 'musl') }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          tool: cargo-zigbuild

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            ~/.napi-rs
            packages/@conf-ts/compiler-native/.cargo-cache
            packages/@conf-ts/target
          key: ${{ matrix.settings.target }}-cargo-${{ matrix.settings.host }}

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm --workspace-concurrency=1 --filter @conf-ts/compiler-native --filter @conf-ts/diff-native --filter @conf-ts/macro-transformer-native exec napi build --platform --release ${{ matrix.settings.args }}
        shell: bash

      - name: Upload compiler artifact
        uses: actions/upload-artifact@v7
        with:
          name: compiler-native-${{ matrix.settings.target }}
          path: packages/@conf-ts/compiler-native/compiler-native.*.node
          if-no-files-found: error

      - name: Upload macro transformer artifact
        uses: actions/upload-artifact@v7
        with:
          name: macro-transformer-native-${{ matrix.settings.target }}
          path: packages/@conf-ts/macro-transformer-native/macro-transformer-native.*.node
          if-no-files-found: error

      - name: Upload diff artifact
        uses: actions/upload-artifact@v7
        with:
          name: diff-native-${{ matrix.settings.target }}
          path: packages/@conf-ts/diff-native/diff-native.*.node
          if-no-files-found: error

  publish:
    name: Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    # needs: [native-lint, test-macOS-windows-binding, test-linux-binding]
    needs: [build, native-lint, native-build]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          cache: true

      - name: Install dependencies
        run: pnpm install

      - name: Create native npm packages
        run: |
          pnpm --filter @conf-ts/compiler-native exec napi create-npm-dirs
          pnpm --filter @conf-ts/diff-native exec napi create-npm-dirs
          pnpm --filter @conf-ts/macro-transformer-native exec napi create-npm-dirs

      - name: Download compiler native artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: compiler-native-*
          path: packages/@conf-ts/compiler-native/artifacts
          merge-multiple: true

      - name: Download macro transformer native artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: macro-transformer-native-*
          path: packages/@conf-ts/macro-transformer-native/artifacts
          merge-multiple: true

      - name: Download diff native artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: diff-native-*
          path: packages/@conf-ts/diff-native/artifacts
          merge-multiple: true

      - name: Assemble native packages
        run: |
          pnpm --filter @conf-ts/compiler-native exec napi artifacts --output-dir artifacts
          pnpm --filter @conf-ts/diff-native exec napi artifacts --output-dir artifacts
          pnpm --filter @conf-ts/macro-transformer-native exec napi artifacts --output-dir artifacts

      - name: Build packages
        run: |
          pnpm --filter @conf-ts/expr-core build
          pnpm --filter @conf-ts/expression build
          pnpm --filter @conf-ts/macro build
          pnpm --filter @conf-ts/compiler build
          pnpm --filter @conf-ts/diff build
          pnpm --filter @conf-ts/macro-transformer build
          pnpm --filter @conf-ts/cli build
          pnpm --filter @conf-ts/webpack-plugin build

      - name: Configure npm registry
        run: |
          echo "//registry.npmjs.org/:_authToken=$NPM_TOKEN" >> ~/.npmrc
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Determine publish tag
        id: tag
        run: |
          if git log -1 --pretty=%B | grep -qE "^[0-9]+\.[0-9]+\.[0-9]+$"; then
            echo "tag=" >> $GITHUB_OUTPUT
            echo "reason=stable release"
          elif git log -1 --pretty=%B | grep -qE "^[0-9]+\.[0-9]+\.[0-9]+"; then
            echo "tag=--tag next" >> $GITHUB_OUTPUT
            echo "reason=pre-release"
          else
            echo "tag=skip" >> $GITHUB_OUTPUT
            echo "reason=not a release commit"
          fi
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish packages
        if: steps.tag.outputs.tag != 'skip'
        run: |
          pnpm config set provenance true
          pnpm config set git-checks false
          git status
          git diff
          pnpm publish -r --filter "@conf-ts/compiler-native*" --access public ${{ steps.tag.outputs.tag }}
          pnpm publish -r --filter "@conf-ts/diff-native*" --access public ${{ steps.tag.outputs.tag }}
          pnpm publish -r --filter "@conf-ts/macro-transformer-native*" --access public ${{ steps.tag.outputs.tag }}
          git status
          git diff
          pnpm publish -r --filter "@conf-ts/expr-core" --access public ${{ steps.tag.outputs.tag }}
          pnpm publish -r --filter "@conf-ts/expression" --access public ${{ steps.tag.outputs.tag }}
          pnpm publish -r --filter "@conf-ts/compiler" --access public ${{ steps.tag.outputs.tag }}
          pnpm publish -r --filter "@conf-ts/diff" --access public ${{ steps.tag.outputs.tag }}
          pnpm publish -r --filter "@conf-ts/macro" --access public ${{ steps.tag.outputs.tag }}
          pnpm publish -r --filter "@conf-ts/macro-transformer" --access public ${{ steps.tag.outputs.tag }}
          pnpm publish -r --filter "@conf-ts/cli" --access public ${{ steps.tag.outputs.tag }}
          pnpm publish -r --filter "@conf-ts/webpack-plugin" --access public ${{ steps.tag.outputs.tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Skip publish
        if: steps.tag.outputs.tag == 'skip'
        run: echo "Not a release, skipping publish"
