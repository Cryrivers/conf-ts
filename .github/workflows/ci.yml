name: CI

env:
  DEBUG: napi:*
  MACOSX_DEPLOYMENT_TARGET: "10.13"
  CARGO_INCREMENTAL: "1"

on:
  push:
    branches: [main]
    tags-ignore: ["**"]
    paths-ignore:
      - "**/*.md"
      - LICENSE
      - "**/*.gitignore"
      - .editorconfig
      - docs/**
  pull_request:
    types: [opened, synchronize]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

jobs:
  build:
    name: Build and Test
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1, wasm32-wasip1-threads

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          cache: true

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build

      - name: Test compiler WASI target
        run: pnpm --filter @conf-ts/compiler-native test:wasi

      - name: Upload compiler WASI artifacts
        uses: actions/upload-artifact@v7
        with:
          name: compiler-wasi
          path: |
            packages/@conf-ts/compiler-native/compiler-native.wasm32-wasi.wasm
            packages/@conf-ts/compiler-native/compiler-native.wasi.cjs
            packages/@conf-ts/compiler-native/compiler-native.wasi-browser.js
            packages/@conf-ts/compiler-native/browser.js
            packages/@conf-ts/compiler-native/wasi-worker.mjs
            packages/@conf-ts/compiler-native/wasi-worker-browser.mjs
            packages/@conf-ts/compiler-native/index.js
            packages/@conf-ts/compiler-native/index.d.ts
          if-no-files-found: error

      - name: Upload macro transformer WASI artifacts
        uses: actions/upload-artifact@v7
        with:
          name: macro-wasi
          path: |
            packages/@conf-ts/macro-transformer-native/macro-transformer-native.wasm32-wasi.wasm
            packages/@conf-ts/macro-transformer-native/macro-transformer-native.wasi.cjs
            packages/@conf-ts/macro-transformer-native/macro-transformer-native.wasi-browser.js
            packages/@conf-ts/macro-transformer-native/browser.js
            packages/@conf-ts/macro-transformer-native/wasi-worker.mjs
            packages/@conf-ts/macro-transformer-native/wasi-worker-browser.mjs
            packages/@conf-ts/macro-transformer-native/index.js
            packages/@conf-ts/macro-transformer-native/index.d.ts
          if-no-files-found: error

      - name: Upload SWC plugin artifact
        uses: actions/upload-artifact@v7
        with:
          name: swc-plugin-wasm
          path: packages/@conf-ts/swc-plugin/conf_ts_swc_plugin.wasm
          if-no-files-found: error

      - name: Test
        run: pnpm test

  native-lint:
    name: Lint (native)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          cache: true

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install dependencies
        run: pnpm install

      # - name: Oxlint
      #   run: pnpm --filter @conf-ts/compiler-native lint

      - name: Cargo fmt
        run: cargo fmt --all -- --check
        working-directory: packages/@conf-ts

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
        working-directory: packages/@conf-ts

  native-build:
    name: Native - ${{ matrix.settings.target }} - node@24
    runs-on: ${{ matrix.settings.host }}
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: macos-latest
            target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin
          - host: windows-latest
            target: x86_64-pc-windows-msvc
            args: --target x86_64-pc-windows-msvc
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            args: --target x86_64-unknown-linux-gnu --use-napi-cross
          - host: ubuntu-latest
            target: x86_64-unknown-linux-musl
            args: --target x86_64-unknown-linux-musl --cross-compile
          - host: macos-latest
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          cache: true

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.settings.target }}

      - uses: mlugg/setup-zig@v2
        if: ${{ contains(matrix.settings.target, 'musl') }}
        with:
          version: 0.14.1

      - name: Install cargo-zigbuild
        uses: taiki-e/install-action@v2
        if: ${{ contains(matrix.settings.target, 'musl') }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          tool: cargo-zigbuild

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            ~/.napi-rs
            packages/@conf-ts/compiler-native/.cargo-cache
            packages/@conf-ts/target
          key: ${{ matrix.settings.target }}-cargo-${{ matrix.settings.host }}

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm --filter @conf-ts/compiler-native --filter @conf-ts/macro-transformer-native exec napi build --platform --release ${{ matrix.settings.args }}
        shell: bash

      - name: Upload compiler artifact
        uses: actions/upload-artifact@v7
        with:
          name: bindings-${{ matrix.settings.target }}
          path: packages/@conf-ts/compiler-native/compiler-native.*.node
          if-no-files-found: error

      - name: Upload macro transformer artifact
        uses: actions/upload-artifact@v7
        with:
          name: macro-bindings-${{ matrix.settings.target }}
          path: packages/@conf-ts/macro-transformer-native/macro-transformer-native.*.node
          if-no-files-found: error

