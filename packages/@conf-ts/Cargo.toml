[workspace]
resolver = "2"
members = [
  "compiler-native",
  "macro-transformer-core",
  "macro-transformer-native",
  "swc-plugin",
]

[profile.release]
lto = true
strip = "symbols"

# All native entry points share one SWC version and one lockfile so the N-API
# adapters and the standard SWC plugin consume the exact same AST types.
