[workspace]
resolver = "2"
members = [
  "compiler-native",
  "macro-transformer-native",
]

[workspace.dependencies]
criterion = { version = "0.5", features = ["html_reports"] }

[profile.release]
lto = true
strip = "symbols"

# Native compiler and transformer crates share one lockfile so their Oxc AST,
# semantic, N-API, and serialization types cannot drift independently.
