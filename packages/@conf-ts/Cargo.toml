[workspace]
resolver = "2"
members = ["compiler-native", "macro-transformer-native"]

[profile.release]
lto = true
strip = "symbols"

# Keeping compiler-native and macro-transformer-native in one Cargo workspace
# (one shared Cargo.lock/target dir) is required so their oxc/napi/serde
# dependency versions can never drift apart: macro-transformer-native embeds
# compiler-native's compiled code via a path dependency (Rust has no
# npm-style dynamic linking), so a version mismatch would otherwise only
# surface as a hard-to-diagnose type error, or worse, silently link two
# incompatible copies of oxc's AST types.
