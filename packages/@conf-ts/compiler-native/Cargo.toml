[package]
name = "compiler_native"
version = "0.0.1"
edition = "2024"

[lib]
crate-type = ["cdylib"]

[dependencies]
napi = "3.0.0"
napi-derive = "3.0.0"
swc_common = { version = "19", features = ["sourcemap"] }
swc_ecma_parser = "35"
swc_ecma_ast = "21"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"

[build-dependencies]
napi-build = "2"

[profile.release]
lto = true
strip = "symbols"