[package]
name = "compiler_native"
version = "0.0.3"
edition = "2024"

[lib]
crate-type = ["cdylib"]

[dependencies]
napi = "3.8.5"
napi-derive = "3.5.4"
swc_common = { version = "21.0.1", features = ["sourcemap"] }
swc_ecma_parser = "39.0.0"
swc_ecma_ast = "23.0.0"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = { version = "1.0.149", features = ["preserve_order"] }
serde_yaml = "0.9.34"

[build-dependencies]
napi-build = "2.3.1"

[profile.release]
lto = true
strip = "symbols"
