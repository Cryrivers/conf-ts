[package]
name = "compiler_native"
version = "0.0.13"
edition = "2024"

[lib]
crate-type = ["cdylib", "rlib"]

[features]
default = ["napi-bindings"]
napi-bindings = ["dep:napi", "dep:napi-derive"]

[dependencies]
napi = { version = "3.10.5", features = ["serde-json"], optional = true }
napi-derive = { version = "3.5.10", optional = true }
oxc_allocator = "=0.140.0"
oxc_parser = "=0.140.0"
oxc_ast = "=0.140.0"
oxc_semantic = "=0.140.0"
oxc_span = "=0.140.0"
self_cell = "1.3.0"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = { version = "1.0.150", features = ["preserve_order"] }
serde_yaml = "0.9.34"

[build-dependencies]
napi-build = "2.3.2"
