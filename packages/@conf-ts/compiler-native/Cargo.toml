[package]
name = "compiler_native"
version = "0.0.9"
edition = "2024"

[lib]
crate-type = ["cdylib"]

[dependencies]
napi = "3.8.5"
napi-derive = "3.5.4"
oxc_allocator = "0.139.0"
oxc_parser = "0.139.0"
oxc_ast = "0.139.0"
oxc_span = "0.139.0"
self_cell = "1.2"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = { version = "1.0.149", features = ["preserve_order"] }
serde_yaml = "0.9.34"

[build-dependencies]
napi-build = "2.3.1"

[profile.release]
lto = true
strip = "symbols"
