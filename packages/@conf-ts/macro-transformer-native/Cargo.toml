[package]
name = "macro_transformer_native"
version = "0.0.12"
edition = "2024"

[lib]
crate-type = ["cdylib"]

[dependencies]
compiler_native = { path = "../compiler-native", default-features = false }
napi = { version = "3.8.5", features = ["serde-json"] }
napi-derive = "3.5.4"
oxc_ast = "=0.139.0"
oxc_ast_visit = "=0.139.0"
oxc_semantic = "=0.139.0"
oxc_span = "=0.139.0"
oxc_sourcemap = "=8.0.2"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = { version = "1.0.149", features = ["preserve_order"] }

[build-dependencies]
napi-build = "2.3.1"
