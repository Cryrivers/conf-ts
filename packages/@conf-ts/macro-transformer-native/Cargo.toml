[package]
name = "macro_transformer_native"
version = "0.0.12"
edition = "2024"

[lib]
crate-type = ["cdylib"]

[dependencies]
macro_transformer_core = { path = "../macro-transformer-core" }
napi = { version = "3.8.5", features = ["serde-json"] }
napi-derive = "3.5.4"
serde_json = { version = "1.0.149", features = ["preserve_order"] }

[build-dependencies]
napi-build = "2.3.1"
