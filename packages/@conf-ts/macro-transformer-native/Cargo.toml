[package]
name = "macro_transformer_native"
version = "0.0.14"
edition = "2024"

[lib]
crate-type = ["cdylib"]

[dependencies]
compiler_native = { path = "../compiler-native", default-features = false }
napi = { version = "3.10.5", features = ["serde-json"] }
napi-derive = "3.5.10"
json-strip-comments = "=3.1.1"
oxc_allocator = "=0.140.0"
oxc_ast = "=0.140.0"
oxc_ast_visit = "=0.140.0"
oxc_parser = "=0.140.0"
oxc_resolver = "=11.24.2"
oxc_semantic = "=0.140.0"
oxc_span = "=0.140.0"
oxc_sourcemap = "=8.1.1"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = { version = "1.0.150", features = ["preserve_order"] }

[build-dependencies]
napi-build = "2.3.2"
