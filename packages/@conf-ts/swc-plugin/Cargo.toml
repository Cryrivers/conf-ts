[package]
name = "conf_ts_swc_plugin"
version = "0.0.12"
edition = "2024"
publish = false

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
macro_transformer_core = { path = "../macro-transformer-core" }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
swc_core = { version = "=73.0.0", features = ["ecma_plugin_transform"] }

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ["cfg(swc_ast_unknown)"] }
