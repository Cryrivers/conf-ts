[package]
name = "diff_native"
version = "0.0.17"
edition = "2024"

[lib]
crate-type = ["cdylib"]

[dependencies]
napi = { version = "3.10.5", features = ["serde-json"] }
napi-derive = "3.5.10"
oxc_allocator = "=0.140.0"
oxc_ast = "=0.140.0"
oxc_parser = "=0.140.0"
oxc_span = "=0.140.0"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = { version = "1.0.150", features = ["preserve_order"] }

[build-dependencies]
napi-build = "2.3.2"
