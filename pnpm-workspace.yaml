packages:
  - packages/@conf-ts/*
  - packages/@conf-ts/compiler-native/npm/*
  - packages/@conf-ts/macro-transformer-native/npm/*
  - packages/playground

allowBuilds:
  '@swc/core': true
  esbuild: true
  sharp: true

minimumReleaseAgeExclude:
  - webpack@5.107.1
  - '@types/node@26.0.0 || 26.1.1'
  - '@vitest/coverage-v8@4.1.10'
  - '@vitest/expect@4.1.10'
  - '@vitest/mocker@4.1.10'
  - '@vitest/pretty-format@4.1.10'
  - '@vitest/runner@4.1.10'
  - '@vitest/snapshot@4.1.10'
  - '@vitest/spy@4.1.10'
  - '@vitest/ui@4.1.10'
  - '@vitest/utils@4.1.10'
  - vitest@4.1.10
  - tsdown@0.22.4 || 0.22.7
  - rolldown-plugin-dts@0.27.8
  - tsx@4.23.1

onlyBuiltDependencies:
  - esbuild
  - sharp
